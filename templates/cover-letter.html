<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover Letter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
    font-size: 11pt;
    line-height: 1.7;
    color: #1A1A1A;
    background: white;
    padding: 20mm 20mm;
    max-width: 210mm;
    margin: 0 auto;
  }
  .cover-letter-header { margin-bottom: 24pt; }
  .cover-letter-name { font-size: 14pt; font-weight: 700; }
  .cover-letter-contacts { color: #6B6860; font-size: 9pt; margin-top: 4pt; }
  .cover-letter-date { margin: 16pt 0; color: #6B6860; }
  .cover-letter-body { white-space: pre-wrap; }
  .cover-letter-signature { margin-top: 24pt; }
</style>
</head>
<body>
  <div id="cover-letter-output"></div>
</body>
</html>
